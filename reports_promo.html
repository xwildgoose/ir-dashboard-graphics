<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Related Reports</title>
<style>
:root{--royal:#0070c0;--font:'Plus Jakarta Sans','Segoe UI',Tahoma,Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:transparent;overflow:hidden}
.banner{position:relative;width:100%;height:100%;min-height:0;overflow:hidden;border-radius:16px;
  background:radial-gradient(130% 160% at 15% 34%,#22478d 0%,#12295c 46%,#091634 100%)}
#fx{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.glow{position:absolute;left:6%;top:50%;width:210px;height:210px;transform:translateY(-50%);border-radius:50%;
  background:radial-gradient(circle,rgba(0,140,255,.42),transparent 68%);filter:blur(7px);z-index:1;pointer-events:none;animation:breathe 6s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.7}50%{opacity:1}}
.wrap{position:relative;z-index:2;height:100%;display:flex;align-items:center;padding:16px 30px 16px 16px;gap:20px}
.covers{position:relative;width:220px;height:100%;flex:0 0 auto}
.cv{position:absolute;left:50%;top:50%;width:120px;margin-left:-60px;margin-top:-77px;border-radius:5px;
  box-shadow:0 16px 40px rgba(0,8,32,.6),0 0 0 1px rgba(255,255,255,.09);opacity:0;will-change:transform}
.cv0{z-index:1}.cv2{z-index:2}.cv1{z-index:3}
.promo{flex:1;min-width:0;color:#fff}
.eyebrow{font-size:10px;letter-spacing:3.5px;text-transform:uppercase;font-weight:700;color:#8fc0ff;opacity:0;animation:fade .8s .3s forwards}
.promo h1{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.14;margin-top:7px;text-shadow:0 2px 20px rgba(0,60,160,.5);opacity:0;animation:fade .8s .5s forwards}
.promo p{font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.66);margin-top:8px;max-width:400px;opacity:0;animation:fade .8s .7s forwards}
.cta{display:inline-flex;align-items:center;gap:8px;margin-top:14px;background:#fff;color:var(--royal);font-size:12.5px;font-weight:700;
  padding:10px 18px;border-radius:10px;box-shadow:0 10px 26px rgba(0,120,255,.35);opacity:0;
  animation:fade .8s .95s forwards,pulse 3.2s 1.6s ease-in-out infinite}
.cta svg{width:15px;height:15px}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 10px 26px rgba(0,120,255,.35)}50%{box-shadow:0 13px 36px rgba(0,150,255,.6)}}
</style></head>

<script>
(function(){
  var cv=document.getElementById('fx'),ctx=cv.getContext('2d'),W,H;
  function resize(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  var N=40,P=[];
  for(var i=0;i<N;i++)P.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.9+0.6,vx:(Math.random()-.5)*0.2,vy:(Math.random()-.5)*0.2,a:Math.random()*0.45+0.12});
  function particles(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<P.length;i++){var p=P[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4.2);
      g.addColorStop(0,'rgba(150,205,255,'+p.a+')');g.addColorStop(1,'rgba(150,205,255,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*4.2,0,7);ctx.fill();}
  }
  var covers=[
    {el:document.querySelector('.cv0'),x:-52,y:6,rot:-12,amp:6,ph:0,spd:0.0011},
    {el:document.querySelector('.cv1'),x:-2,y:-7,rot:-1,amp:8,ph:2.1,spd:0.0009},
    {el:document.querySelector('.cv2'),x:48,y:6,rot:11,amp:6,ph:4.2,spd:0.0012}
  ];
  var t0=performance.now();
  function frame(now){
    var t=now-t0,intro=Math.min(t/900,1),e=1-Math.pow(1-intro,3);
    for(var i=0;i<covers.length;i++){var c=covers[i];
      var bob=Math.sin(now*c.spd+c.ph)*c.amp*e, rbob=Math.sin(now*c.spd*0.8+c.ph)*1.3*e;
      var x=c.x*e,y=c.y*e+bob,rot=c.rot*e+rbob,sc=0.9+0.1*e;
      c.el.style.transform='translate('+x+'px,'+y+'px) rotate('+rot+'deg) scale('+sc+')';
      c.el.style.opacity=e;}
    particles();requestAnimationFrame(frame);
  }
